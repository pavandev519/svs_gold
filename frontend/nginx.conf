server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Serve the React app
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;

    # Cache static assets (JS, CSS, fonts, images)
    location ~* \.(js|css|map|woff|woff2|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # All other requests go to index.html (for React Router)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API requests - return error when backend not available (standalone mode)
    location /api/ {
        return 503 '{"error": "API backend not available in standalone mode"}';
        add_header Content-Type application/json;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
